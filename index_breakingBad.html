<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="5;URL=https://google.com">
    <title>Breaking Bad Trivia</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <style>
      *{
        margin: 0%;
        padding: 0%;
        box-sizing: border-box;
        list-style: none;
        scroll-behavior: smooth;
      }

      .header{
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 5px;
      }

      .nav{
        width: 5%;
        text-align: center;
      }

      .nav:hover{
        cursor: pointer;
      }

      .nav:first-child{
        margin-right: 10px;
      }
      .nav:last-child{
        margin-left: 10px;
      }

      .card-div{
        width: 50vh;
        height: 40vh;
        border: 1px solid gray;
        display: flex;
        flex-wrap: nowrap;
        overflow-x: scroll;
        
        overscroll-behavior: contain;

  /* hide scroll bar */
  scrollbar-width: none;
  -ms-overflow-style: none;

  /* momentum scroll on iOS */
  -webkit-overflow-scrolling: touch;

  /* disbable vertical scroll for touch */
  /*touch-action: pan-x;*/

  /* scroll snapping */
  scroll-snap-type: x mandatory;
      }

  .card-div::-webkit-scrollbar {
  display: none;
  }

      .card{
        width: 100%;
        margin: 2px;
        flex-shrink: 0;

        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-start;

        scroll-snap-align: start;
        scroll-snap-stop: always;
      }

      .quote{
        text-align: center;
        color: blue;
      }

      .heading{
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .heading h1{
        margin-bottom: 50px;
      }

     .results-button{

       width: 200px;
       height: 50px;
       border: 1px solid green;
       border-radius: 5px;
       display: flex;
       justify-content: center;
       align-items: center;
       background-color: rgb(175, 120, 226);
     }

     .results-button:hover{
       
        cursor: pointer;

     }

    </style>
  </head>
  <body style="background-color: rgb(202, 192, 192)">
    <div class="heading">
      <h1>Breaking Bad Trivia Game</h1>
      <p class="index">1/5</p>
  </div>

    <div class="header">

    <span id="left" class="nav material-icons" style="font-size: 3em;">arrow_back_ios</span>

    <div class="card-div">
      
    </div>

    <span id="right" class="nav material-icons" style="font-size: 3em;"> arrow_forward_ios </span>

    </div>

    <div class="heading">
      <div class="results-button">
        Check Answers
      </div>

      <div class="results">

      </div>
    </div>
    




    <script src="task3.js"></script>
  </body>
</html>
